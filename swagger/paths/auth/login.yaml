post:
  tags:
    - Auth
  summary: Log in a user
  operationId: loginUser
  description: Authenticates a user with an email and password, returning an access token.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [email, password]
          properties:
            email:
              type: string
              format: email
              example: john.doe@example.com
            password:
              type: string
              format: password
              example: mysecretpassword123
  responses:
    '200':
      description: Successfully logged in.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully logged in an user!
              data:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI2NjMyYzJhOTMxZGU1NTgzYjdmODNiMTgiLCJpYXQiOjE2MjQwNjQwMDAsImV4cCI6MTYyNDA2NDkwMH0.abc...
    '401':
      description: Unauthorized. Invalid credentials.
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Error.yaml'