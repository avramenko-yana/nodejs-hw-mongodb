get:
  tags:
    - Contacts
  summary: Get all user contacts
  operationId: getContacts
  description: Returns a paginated list of contacts for the authenticated user.
  security:
    - bearerAuth: []
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        default: 1
    - name: perPage
      in: query
      schema:
        type: integer
        default: 10
    - name: sortBy
      in: query
      schema:
        type: string
        enum: [name, email, contactType]
        default: name
    - name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    - name: type
      in: query
      schema:
        type: string
        enum: [work, home, personal]
    - name: isFavourite
      in: query
      schema:
        type: boolean
  responses:
    '200':
      description: A list of contacts.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 200
              message:
                type: string
                example: Successfully found contacts!
              data:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '../../components/schemas/Contact.yaml'
                  # ... other pagination fields
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Error.yaml'

post:
  tags:
    - Contacts
  summary: Create a new contact
  operationId: createContact
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required: [name, phoneNumber, contactType]
          properties:
            name:
              type: string
            phoneNumber:
              type: string
            email:
              type: string
            isFavourite:
              type: boolean
            contactType:
              type: string
              enum: [work, home, personal]
            photo:
              type: string
              format: binary
  responses:
    '201':
      description: Contact created successfully.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: integer
                example: 201
              message:
                type: string
                example: Successfully created a contact!
              data:
                $ref: '../../components/schemas/Contact.yaml'
    '400':
      description: Bad Request (Validation Error)
    '401':
      description: Unauthorized